version: '3.9'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "5001:5001"
    volumes:
      - ${PWD}/instance:/app/instance
    environment:
      - FLASK_ENV=development

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend